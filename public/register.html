<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - Create Account</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .header h1 { margin: 0; color: #2c3e50; font-size: 28px; }
        .header p { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; margin-bottom: 15px; }
        button:hover { background-color: #219653; }
        .error-message { color: #e74c3c; font-size: 14px; margin-top: 10px; display: none; }
        .success-message { color: #27ae60; font-size: 14px; margin-top: 10px; font-weight: bold; display: none; }
        .toggle-link { color: #3498db; text-decoration: none; font-size: 14px; }
        .toggle-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h1>Kalapp</h1>
            <p>Create a Citizen Account</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">Choose a Username</label>
                <input type="text" id="username" placeholder="e.g., maria_delacruz" required>
            </div>
            
            <div class="form-group">
                <label for="password">Create a Password</label>
                <input type="password" id="password" placeholder="Must be at least 3 characters" required>
            </div>

            <button type="submit">Sign Up</button>
            
            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message">Account created! Redirecting to login...</div>
        </form>

        <a href="/login.html" class="toggle-link">Already have an account? Log in here.</a>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // Send new user data to the server
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Show success text and hide error text
                    document.getElementById('error-msg').style.display = 'none';
                    document.getElementById('success-msg').style.display = 'block';
                    
                    // Automatically redirect them to the login page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    // Show the specific error message from the server (e.g., "Username taken")
                    const errorElement = document.getElementById('error-msg');
                    errorElement.innerText = data.message;
                    errorElement.style.display = 'block';
                    document.getElementById('success-msg').style.display = 'none';
                }
            })
            .catch(error => console.error('Error registering:', error));
        });
    </script>

</body>
</html>
