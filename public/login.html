<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --orange: #ff8c00; --orange-hover: #e67e00; --input-bg: #ffffff; --input-border: #e2e8f0;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        body.dark {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --input-bg: #0f172a; --input-border: #334155; --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: all 0.3s ease; }
        .login-card { background: var(--bg-card); padding: 40px; border-radius: 20px; box-shadow: var(--card-shadow); width: 100%; max-width: 400px; text-align: center; position: relative; border-top: 5px solid var(--orange); }
        #mode-toggle { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .login-card h1 { font-weight: 800; letter-spacing: -1.5px; margin: 0 0 5px 0; font-size: 32px; }
        .login-card p.subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; }
        input { width: 100%; padding: 12px; background-color: var(--input-bg); border: 2px solid var(--input-border); border-radius: 10px; box-sizing: border-box; font-size: 14px; color: var(--text-main); transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--orange); }
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; margin-bottom: 15px; }
        .btn-orange { background-color: var(--orange); box-shadow: 0 4px 12px rgba(255, 140, 0, 0.2); }
        .btn-orange:hover { background-color: var(--orange-hover); transform: translateY(-1px); }
        .toggle-text { color: var(--orange); cursor: pointer; font-weight: 700; text-decoration: none; }
        .toggle-text:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--input-border); }
        .divider span { padding: 0 10px; color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .btn-dev { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); font-size: 11px; padding: 10px; border-radius: 8px; margin-top: 10px; width: 100%; cursor: pointer; }
        #error-msg { color: #ef4444; font-size: 13px; margin-bottom: 10px; font-weight: 600; min-height: 18px; }
        #success-msg { color: #10b981; font-size: 13px; margin-bottom: 10px; font-weight: 600; min-height: 18px; }
        #signup-section, #otp-section { display: none; }
        .google-btn-container { display: flex; justify-content: center; }
    </style>
</head>
<body id="page-body">
    <div class="login-card">
        <a href="/index.html" style="text-decoration: none; display: block; margin-bottom: 20px; font-size: 14px; color: var(--text-muted); text-align: left;">&larr; Back to Home</a>
        <button id="mode-toggle">🌓</button>

        <img src="logokalapp.png" alt="Kalapp Logo" style="width: 80px; height: auto; margin-bottom: 10px;">

        <h1>Kalapp</h1>
        <p class="subtitle">Smart Barangay Complaint System</p>
        <div id="error-msg"></div>
        <div id="success-msg"></div>

        <div id="login-section">
            <form id="login-form">
                <div class="form-group"><label>Username</label><input type="text" id="login-username" placeholder="Enter your username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" required></div>
                <button type="submit" class="btn btn-orange">Sign In</button>
            </form>
            <p style="font-size: 13px; color: var(--text-muted);">Don't have an account? <span class="toggle-text" onclick="toggleView('signup')">Sign Up</span></p>
            <div class="divider"><span>Or continue with</span></div>
            <div class="google-btn-container">
                <div id="g_id_onload" data-client_id="714569037465-7ni0csmq193a0tl6sbne3g35entfj6ok.apps.googleusercontent.com" data-callback="handleGoogleLogin" data-use_fedcm_for_prompt="true" data-auto_prompt="false"></div>
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"></div>
            </div>
            <button onclick="devBypass()" class="btn-dev">⚠️ Developer Bypass: Skip Auth</button>
        </div>

        <div id="signup-section">
            <form id="signup-form">
                <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="email@domain.com" required></div>
                <div class="form-group"><label>Username</label><input type="text" id="reg-username" placeholder="Create username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Create password" required></div>
                <button type="submit" class="btn btn-orange" id="btn-request-otp">Send Verification Code</button>
            </form>
            <p style="font-size: 13px; color: var(--text-muted);">Joined us before? <span class="toggle-text" onclick="toggleView('login')">Back to Login</span></p>
        </div>

        <div id="otp-section">
            <h3 style="margin-bottom: 10px;">Verify Your Email</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">We sent a 6-digit code to your inbox.</p>
            <form id="otp-form">
                <div class="form-group"><input type="text" id="otp-code" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 800;" placeholder="000000" required></div>
                <button type="submit" class="btn btn-orange" id="btn-verify-otp">Verify & Register</button>
            </form>
            <p style="font-size: 13px;"><span class="toggle-text" onclick="toggleView('signup')">Change Email Address</span></p>
        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('kalapp-theme');
        if (savedTheme === 'dark') document.body.classList.add('dark');
        const toggleBtn = document.getElementById('mode-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('kalapp-theme', isDark ? 'dark' : 'light');
            });
        }

        function toggleView(view) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('error-msg').innerText = '';
            document.getElementById('success-msg').innerText = '';
            if(view === 'login') document.getElementById('login-section').style.display = 'block';
            if(view === 'signup') document.getElementById('signup-section').style.display = 'block';
            if(view === 'otp') document.getElementById('otp-section').style.display = 'block';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('error-msg');
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('kalapp_username', user);
                    if (data.role === 'superadmin') window.location.href = '/superadmin-dashboard.html';
                    else if (data.role === 'lgu') window.location.href = '/lgu-dashboard.html';
                    else window.location.href = '/citizen-portal.html';
                } else { 
                    // NEW: Shows "Account Suspended" if they are blocked!
                    errorMsg.innerText = `❌ ${data.message || 'Invalid credentials.'}`; 
                }
            })
        });

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-request-otp');
            const msg = document.getElementById('error-msg');
            const email = document.getElementById('reg-email').value;
            const user = document.getElementById('reg-username').value;
            const pass = document.getElementById('reg-password').value;
            btn.disabled = true; btn.innerText = "Sending..."; msg.innerText = "";
            fetch('/api/request-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false; btn.innerText = "Send Verification Code";
                if(data.success) {
                    toggleView('otp');
                    document.getElementById('success-msg').innerText = "✅ Code sent!";
                } else { msg.innerText = `❌ ${data.message}`; }
            })
            .catch(() => { btn.disabled = false; btn.innerText = "Send Verification Code"; msg.innerText = "⚠️ Server error."; });
        });

        document.getElementById('otp-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const code = document.getElementById('otp-code').value;
            const msg = document.getElementById('error-msg');
            fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: code })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('success-msg').innerText = "✅ Account Created!";
                    localStorage.setItem('kalapp_username', data.username);
                    setTimeout(() => { window.location.href = '/citizen-portal.html'; }, 1000);
                } else { msg.innerText = "❌ Invalid or expired code."; }
            })
            .catch(() => msg.innerText = "⚠️ Server error.");
        });

        function handleGoogleLogin(response) {
            try {
                const responsePayload = decodeJwtResponse(response.credential);
                const realName = responsePayload.name; 
                document.getElementById('success-msg').innerText = `✅ Verified as ${realName}`;
                document.getElementById('error-msg').innerText = "";
                localStorage.setItem('kalapp_username', realName);
                setTimeout(() => { window.location.href = '/citizen-portal.html'; }, 1000);
            } catch (error) { document.getElementById('error-msg').innerText = "⚠️ Google Login blocked by browser."; }
        }

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')));
        }

        function devBypass() {
            localStorage.setItem('kalapp_username', 'Test Citizen');
            window.location.href = '/citizen-portal.html';
        }
    </script>
</body>
</html>
