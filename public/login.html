<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --orange: #ff8c00; --orange-hover: #e67e00; --input-bg: #ffffff; --input-border: #e2e8f0;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: var(--bg-card); padding: 40px; border-radius: 20px; box-shadow: var(--card-shadow); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--orange); }
        h1 { font-weight: 800; margin: 0 0 5px 0; font-size: 32px; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; }
        input { width: 100%; padding: 12px; background-color: var(--input-bg); border: 2px solid var(--input-border); border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: var(--orange); }
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; background-color: var(--orange); margin-bottom: 15px; }
        .btn:hover { background-color: var(--orange-hover); }
        .toggle-text { color: var(--orange); cursor: pointer; font-weight: 700; font-size: 13px; }
        #error-msg { color: #ef4444; font-size: 13px; margin-bottom: 10px; font-weight: 600; min-height: 18px; }
        #success-msg { color: #10b981; font-size: 13px; margin-bottom: 10px; font-weight: 600; min-height: 18px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="/index.html" style="text-decoration: none; display: block; margin-bottom: 20px; font-size: 14px; color: var(--text-muted); text-align: left;">&larr; Back to Home</a>
        
        <h1>Kalapp</h1>
        <p class="subtitle">Smart Barangay Complaint System</p>
        <div id="error-msg"></div>
        <div id="success-msg"></div>

        <div id="signup-section">
            <form id="signup-form">
                <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" required></div>
                <div class="form-group"><label>Your Name</label><input type="text" id="reg-username" required></div>
                <button type="submit" class="btn" id="btn-request-otp">Send Verification Code</button>
            </form>
            <span class="toggle-text" onclick="toggleView('login')">Are you an LGU Official? Login Here</span>
        </div>

        <div id="otp-section" class="hidden">
            <h3 style="margin-bottom: 10px;">Verify Your Email</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">We sent a 6-digit code to your inbox.</p>
            <form id="otp-form">
                <div class="form-group"><input type="text" id="otp-code" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 800;" placeholder="000000" required></div>
                <button type="submit" class="btn" id="btn-verify-otp">Verify & Enter</button>
            </form>
            <span class="toggle-text" onclick="toggleView('signup')">Change Email Address</span>
        </div>

        <div id="login-section" class="hidden">
            <h3 style="margin-bottom: 20px;">Official Login</h3>
            <form id="login-form">
                <div class="form-group"><label>Official Username</label><input type="text" id="login-username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
                <button type="submit" class="btn">Sign In as Official</button>
            </form>
            <span class="toggle-text" onclick="toggleView('signup')">Citizen? Get an Access Code</span>
        </div>
    </div>

    <script>
    function toggleView(view) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('signup-section').classList.add('hidden');
        document.getElementById('otp-section').classList.add('hidden');
        document.getElementById('error-msg').innerText = '';
        document.getElementById('success-msg').innerText = '';
        document.getElementById(`${view}-section`).classList.remove('hidden');
    }

    async function safeFetch(response) {
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || "Server error.");
        return data;
    }

    // Citizen Request OTP
    document.getElementById('signup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-request-otp');
        btn.innerText = "Sending via Brevo..."; btn.disabled = true;
        
        fetch('/api/request-otp', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('reg-email').value, username: document.getElementById('reg-username').value })
        })
        .then(safeFetch)
        .then(data => {
            document.getElementById('success-msg').innerText = "✅ " + data.message;
            setTimeout(() => toggleView('otp'), 1000); 
        })
        .catch(err => document.getElementById('error-msg').innerText = `❌ ${err.message}`)
        .finally(() => { btn.innerText = "Send Verification Code"; btn.disabled = false; });
    });

    // Citizen Verify OTP
    document.getElementById('otp-form').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/verify-otp', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('reg-email').value, otp: document.getElementById('otp-code').value })
        })
        .then(safeFetch)
        .then(data => {
            localStorage.setItem('kalapp_username', data.username);
            window.location.href = '/citizen-portal.html';
        })
        .catch(err => document.getElementById('error-msg').innerText = `❌ ${err.message}`);
    });

    // LGU Admin Login
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('login-username').value, password: document.getElementById('login-password').value })
        })
        .then(safeFetch)
        .then(data => {
            localStorage.setItem('kalapp_username', data.username);
            window.location.href = data.role === 'superadmin' ? '/superadmin-dashboard.html' : '/lgu-dashboard.html';
        })
        .catch(err => document.getElementById('error-msg').innerText = `❌ ${err.message}`);
    });
    </script>
</body>
</html>
